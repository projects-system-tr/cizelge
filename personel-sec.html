<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personel Seç — Günlük Takip Sistemi</title>
<link rel="icon" href="assets/favicon-32.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="giris-sarmalayici">
    <div class="giris-kart" style="width:420px;">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:6px;">
        <img src="assets/logo.png" alt="" style="width:38px; height:38px; object-fit:contain;" />
        <h1 style="margin:0;">Personel Seçimi</h1>
      </div>
      <p class="aciklama">Formu dolduran personeli seçin. Bu bilgi, kaydettiğiniz günlük işaretlemelerde ve rapor çıktısında kullanılacaktır.</p>

      <div id="hataMesaji" class="hata-mesaji"></div>

      <div id="personelListesi" class="personel-listesi"></div>

      <div style="display:flex; gap:8px; margin-top:14px;">
        <input type="text" id="yeniPersonelAdi" placeholder="Yeni personel adı soyadı" style="flex:1; padding:10px 12px; border:1px solid var(--kenar); border-radius:8px; font-size:14px;" />
        <button class="buton" id="yeniEkleBtn">Ekle</button>
      </div>

      <button class="buton birincil" id="devamBtn" disabled style="width:100%; justify-content:center; padding:11px 0; margin-top:18px;">
        Devam Et
      </button>

      <p style="margin-top:14px; font-size:12px; text-align:center;">
        <a href="personel-yonetim.html">Personel listesini yönet (ekle/çıkar)</a>
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/personel.js"></script>
  <script src="js/personel-sec-page.js"></script>
</body>
</html>
